<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Dashboard - Business Manager</title>
    <link rel="preconnect" href="https://fonts.googleapis.com"/>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body>
<div class="plantilla">
    <div th:replace="~{panelLateral/panelLateral :: panelLateral('modulos')}"></div>

    <div class="main">
        <div class="barraSuperior">
            <div class="barraSuperior-titulo">Modulos</div>
            <div class="barraSuperior-info">
                <span style="font-size:13px; color: var(--text-secondary);">
                    Bienvenido, <strong th:text="${currentUsername}">Usuario</strong>
                </span>
            </div>
        </div>

        <div class="contenido-modulo">
            <div class="reja-modulo">
                <div class="cuadrado-modulo">
                    <div class="label-modulo">Modulo 1</div>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
