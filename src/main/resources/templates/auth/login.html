<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Iniciar Sesión - Business Manager</title>
    <link rel="preconnect" href="https://fonts.googleapis.com"/>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body>
<div class="contenedor-login">
    <div class="contenedor2-login">
        <div class="logo-login">
            <div class="logo-icon">🏢</div>
            <h1>ERP</h1>
            <p>Gestión empresarial</p>
        </div>

        <div th:if="${error}" class="alerta alerta-danger">⚠️ <span th:text="${error}"></span></div>
        <div th:if="${logout}" class="alerta alerta-success">✅ <span th:text="${logout}"></span></div>
        <div th:if="${success}" class="alerta alerta-success">✅ <span th:text="${success}"></span></div>

        <form th:action="@{/auth/login}" method="post">
            <div class="form-contenedor">
                <label class="form-label" for="nombre">👤 Usuario</label>
                <input type="text" id="nombre" name="nombre" class="form-input"
                       placeholder="Introduce tu nombre de usuario" required autofocus/>
            </div>

            <div class="form-contenedor">
                <label class="form-label" for="contrasena">🔒 Contraseña</label>
                <input type="password" id="contrasena" name="contrasena" class="form-input"
                       placeholder="Introduce tu contraseña" required/>
            </div>

            <button type="submit" class="boton boton-primario boton-bloque boton-login" style="margin-top: 8px;">
                Iniciar Sesión →
            </button>
        </form>

        <hr class="espaciador"/>

        <p style="text-align:center; font-size:13px; color: var(--text-secondary);">
            ¿No tienes cuenta?
            <a th:href="@{/auth/registro}" style="color: var(--primary); font-weight:500;">Regístrate aquí</a>
        </p>

        <p style="text-align:center; font-size:11.5px; color: var(--text-secondary); margin-top:16px;">
            Admin por defecto: <strong>admin</strong> / <strong>admin123</strong>
        </p>
    </div>
</div>
</body>
</html>
