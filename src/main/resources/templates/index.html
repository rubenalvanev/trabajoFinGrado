<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Localytics ERP</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/estilos.css}">
</head>
<body>

<div id="pantalla-login" class="pantalla-login">
    <div class="login-fondo">
        <div class="login-orbe login-orbe-1"></div>
        <div class="login-orbe login-orbe-2"></div>
        <div class="login-orbe login-orbe-3"></div>
    </div>
    <div class="login-tarjeta">
        <div class="login-logo">
            <div class="logo-icono">
                <svg viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <rect width="40" height="40" rx="10" fill="url(#grad)"/>
                    <path d="M10 28L20 12L30 28" stroke="white" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
                    <path d="M14 22H26" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
                    <defs>
                        <linearGradient id="grad" x1="0" y1="0" x2="40" y2="40" gradientUnits="userSpaceOnUse">
                            <stop stop-color="#6366f1"/>
                            <stop offset="1" stop-color="#8b5cf6"/>
                        </linearGradient>
                    </defs>
                </svg>
            </div>
            <div class="logo-texto">
                <span class="logo-nombre">Localytics</span>
                <span class="logo-sub">ERP System</span>
            </div>
        </div>
        <h1 class="login-titulo">Bienvenido de nuevo</h1>
        <p class="login-descripcion">Accede a tu espacio de trabajo</p>
        <form id="form-login" class="login-form" onsubmit="return false;">
            <div class="campo-grupo">
                <label class="campo-etiqueta">Email</label>
                <input type="email" id="login-email" class="campo-input" placeholder="admin@localytics.com" autocomplete="email">
            </div>
            <div class="campo-grupo">
                <label class="campo-etiqueta">Contraseña</label>
                <input type="password" id="login-contrasena" class="campo-input" placeholder="••••••••" autocomplete="current-password">
            </div>
            <div id="login-error" class="mensaje-error oculto"></div>
            <button type="submit" id="btn-login" class="btn-primario btn-completo">
                <span class="btn-texto">Iniciar sesión</span>
                <span class="btn-carga oculto">
                    <svg class="girando" viewBox="0 0 24 24" width="18" height="18"><circle cx="12" cy="12" r="10" stroke="currentColor" stroke-width="2" fill="none" stroke-dasharray="30 70"/></svg>
                </span>
            </button>
        </form>
    </div>
</div>

<div id="app-principal" class="app-principal oculto">
    <aside class="sidebar" id="sidebar">
        <div class="sidebar-cabecera">
            <div class="sidebar-logo">
                <div class="logo-icono logo-icono-sm">
                    <svg viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <rect width="40" height="40" rx="10" fill="url(#grad2)"/>
                        <path d="M10 28L20 12L30 28" stroke="white" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
                        <path d="M14 22H26" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
                        <defs>
                            <linearGradient id="grad2" x1="0" y1="0" x2="40" y2="40" gradientUnits="userSpaceOnUse">
                                <stop stop-color="#6366f1"/><stop offset="1" stop-color="#8b5cf6"/>
                            </linearGradient>
                        </defs>
                    </svg>
                </div>
                <span class="sidebar-nombre-app">Localytics</span>
            </div>
        </div>

        <nav class="sidebar-nav">
            <p class="sidebar-seccion-titulo">Principal</p>
            <div id="nav-modulos-fijos"></div>
            <p class="sidebar-seccion-titulo" id="titulo-modulos-activados" style="display:none;">Módulos</p>
            <div id="nav-modulos-activados"></div>
        </nav>

        <div class="sidebar-pie">
            <button class="btn-cerrar-sesion" onclick="cerrarSesion()">
                <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
                Cerrar sesión
            </button>
        </div>
    </aside>

    <div class="contenido-principal">
        <header class="topbar">
            <div class="topbar-izquierda">
                <h2 class="topbar-modulo" id="topbar-titulo">Módulos</h2>
            </div>
            <div class="topbar-derecha">
                <div class="topbar-usuario">
                    <div class="avatar-usuario" id="avatar-usuario">A</div>
                    <span class="nombre-usuario" id="nombre-usuario">Usuario</span>
                </div>
            </div>
        </header>

        <main class="area-modulo" id="area-modulo">
            <div id="modulo-carga" class="modulo-carga">
                <svg class="girando" viewBox="0 0 24 24" width="32" height="32"><circle cx="12" cy="12" r="10" stroke="#6366f1" stroke-width="2" fill="none" stroke-dasharray="30 70"/></svg>
            </div>

        </main>
    </div>
</div>

<script th:src="@{/js/api.js}"></script>
<script th:src="@{/js/modulos/login.js}"></script>
<script th:src="@{/js/modulos/modulos.js}"></script>
<script th:src="@{/js/modulos/usuarios.js}"></script>
<script th:src="@{/js/modulos/grupos.js}"></script>
<script th:src="@{/js/app.js}"></script>
</body>
</html>
