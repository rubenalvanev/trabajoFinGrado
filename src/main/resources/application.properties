spring.application.name=trabajoFinGrado

spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.sql.init.mode=always
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.time_zone=UTC
spring.jpa.defer-datasource-initialization=true

trabajoFinGrado.jwt.secreto=${JWT_SECRETO}
trabajoFinGrado.jwt.expiracion=${JWT_EXPIRACION:86400000}
trabajoFinGrado.jwt.encabezado=Authorization
trabajoFinGrado.jwt.prefijo=Bearer 

logging.level.com.trabajoFinGrado=DEBUG
logging.level.org.springframework.security=WARN
logging.level.org.hibernate.SQL=WARN

spring.thymeleaf.cache=false
spring.thymeleaf.encoding=UTF-8
spring.web.locale=es_ES
spring.mvc.format.date=dd/MM/yyyy

server.port=8080
server.servlet.context-path=/

trabajoFinGrado.documentos.ruta-almacenamiento=uploads/documentos
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB