spring.application.name=trabajoFinGrado

# ===========================
# BASE DE DATOS H2 (embebida)
# ===========================
spring.datasource.url=jdbc:h2:file:./data/business_manager;AUTO_SERVER=TRUE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# Consola H2 (opcional, útil para ver los datos en el navegador)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ===========================
# JPA / HIBERNATE
# ===========================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# ===========================
# THYMELEAF
# ===========================
spring.thymeleaf.cache=false
spring.thymeleaf.encoding=UTF-8

# ===========================
# SERVER
# ===========================
server.port=8080
server.servlet.context-path=/

# ===========================
# LOGGING
# ===========================
logging.level.com.businessmanager=DEBUG
logging.level.org.springframework.security=INFO
